<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>05.01</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Aldrich&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Share Tech Mono', monospace;
      cursor: none;
    }

    /* ── sky bg ── */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background: linear-gradient(160deg, #c9e8f8 0%, #a0cbee 35%, #7ab8e8 65%, #c6dff5 100%);
    }

    /* ── globe canvas ── */
    #globe {
      position: fixed; inset: 0; z-index: 1;
      width: 100%; height: 100%;
    }

    /* ── grain ── */
    .grain {
      position: fixed; inset: 0; z-index: 2; pointer-events: none;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
    }

    /* ── shard SVG ── */
    .scene {
      position: fixed; inset: 0; width: 100%; height: 100%;
      z-index: 3; pointer-events: none;
    }

    /* ── lime bars ── */
    .lime-bar {
      position: fixed; z-index: 4; pointer-events: none;
      background: #7fff00;
      background-image: radial-gradient(circle, rgba(0,0,0,0.18) 1.2px, transparent 1.2px);
      background-size: 7px 7px;
    }
    .lb1 { left:-5%; top:46%; width:72%; height:52px; transform: rotate(-6deg); }
    .lb2 { right:-5%; top:52%; width:58%; height:44px; transform: rotate(-6deg); }
    .lb3 { left:10%; bottom:18%; width:40%; height:36px; transform: rotate(-6deg); }

    /* ── timer ── */
    .timer-wrap {
      position: fixed; z-index: 20;
      left: 50%; top: 50%;
      transform: translate(-50%, -42%);
      display: flex; flex-direction: column; align-items: center;
    }

    .dot-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(10px, 1.6vw, 15px);
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: #0a0c0a;
      background: rgba(255,255,255,0.55);
      border: 2px solid rgba(0,0,0,0.12);
      padding: 5px 18px 4px;
      backdrop-filter: blur(6px);
      margin-bottom: -2px;
    }

    .units { display: flex; align-items: flex-end; }

    .unit { display: flex; flex-direction: column; align-items: center; }

    .unit-num {
      font-family: 'Aldrich', sans-serif;
      font-size: clamp(62px, 13vw, 170px);
      line-height: 1; font-weight: 400;
      letter-spacing: -0.02em;
      color: #eaf4ff;
      text-shadow: 0 2px 0 rgba(0,0,0,0.18), 0 0 40px rgba(255,255,255,0.35), 2px 2px 0 rgba(90,180,255,0.3);
      -webkit-text-stroke: 1.5px rgba(0,0,0,0.22);
    }

    .unit-label {
      font-size: clamp(8px, 1.1vw, 11px);
      letter-spacing: 0.5em; text-transform: uppercase;
      color: #0a0c0a;
      background: #7fff00;
      background-image: radial-gradient(circle, rgba(0,0,0,0.2) 1px, transparent 1px);
      background-size: 6px 6px;
      padding: 3px 10px 2px; margin-top: -4px;
      font-family: 'Share Tech Mono', monospace;
    }

    .sep {
      font-family: 'Aldrich', sans-serif;
      font-size: clamp(40px, 8vw, 110px);
      line-height: 1; color: rgba(255,255,255,0.5);
      padding: 0 4px 28px;
      -webkit-text-stroke: 1px rgba(0,0,0,0.15);
    }

    .artist-float {
      position: fixed; z-index: 20;
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(9px, 1.2vw, 12px);
      letter-spacing: 0.4em; text-transform: uppercase;
      color: rgba(10,12,10,0.65);
      background: rgba(255,255,255,0.4);
      backdrop-filter: blur(4px);
      border: 1.5px solid rgba(255,255,255,0.6);
      padding: 4px 12px;
    }
    .af-tl { top: 58px; left: 52px; }
    .af-br { bottom: 60px; right: 52px; }

    .date-tag {
      position: fixed; z-index: 20;
      bottom: 62px; left: 50%; transform: translateX(-50%);
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(9px, 1.1vw, 11px);
      letter-spacing: 0.55em; text-transform: uppercase;
      color: rgba(10,12,10,0.5);
      background: rgba(255,255,255,0.35);
      padding: 3px 14px;
      border: 1.5px solid rgba(255,255,255,0.5);
      backdrop-filter: blur(4px); white-space: nowrap;
    }

    /* ── rock cursor ── */
    #cursor {
      position: fixed; z-index: 9999;
      pointer-events: none;
      width: 38px; height: 38px;
      transform: translate(-50%, -50%);
      will-change: transform;
      transition: transform 0.05s linear;
      filter: drop-shadow(2px 3px 4px rgba(0,0,0,0.35));
    }

    /* ── floating shard animation ── */
    @keyframes floatA {
      0%,100% { transform: translateY(0px) rotate(0deg); }
      33%      { transform: translateY(-18px) rotate(3deg); }
      66%      { transform: translateY(10px) rotate(-2deg); }
    }
    @keyframes floatB {
      0%,100% { transform: translateY(0px) rotate(0deg); }
      40%      { transform: translateY(14px) rotate(-4deg); }
      80%      { transform: translateY(-10px) rotate(2deg); }
    }
    @keyframes floatC {
      0%,100% { transform: translateY(0px) rotate(0deg); }
      50%      { transform: translateY(-22px) rotate(5deg); }
    }
    .fa { animation: floatA 7s ease-in-out infinite; }
    .fb { animation: floatB 9s ease-in-out infinite; }
    .fc { animation: floatC 11s ease-in-out infinite; }
    .fd { animation: floatA 13s ease-in-out infinite reverse; }
    .fe { animation: floatB 8s ease-in-out infinite 2s; }
    .ff { animation: floatC 10s ease-in-out infinite 4s; }
  </style>
</head>

<script>
  // ── rock cursor ──
  const cursor = document.getElementById('cursor');
  let cx = -100, cy = -100, angle = 0;
  document.addEventListener('mousemove', e => {
    cx = e.clientX; cy = e.clientY;
    cursor.style.left = cx + 'px';
    cursor.style.top  = cy + 'px';
  });
  // gentle wobble
  function wobble() {
    angle += 0.4;
    cursor.style.transform = `translate(-50%,-50%) rotate(${Math.sin(angle * 0.04) * 12}deg)`;
    requestAnimationFrame(wobble);
  }
  wobble();

  // ── globe wireframe on canvas ──
  const canvas = document.getElementById('globe');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const R = Math.min(window.innerWidth, window.innerHeight) * 0.52;
  let rot = 0;

  function project(lat, lon, tilt) {
    // rotate lon by current spin, tilt globe slightly
    const cosT = Math.cos(tilt), sinT = Math.sin(tilt);
    const phi = (lat * Math.PI) / 180;
    const lam = (lon * Math.PI) / 180 + rot;
    let x = Math.cos(phi) * Math.cos(lam);
    let y = Math.sin(phi);
    let z = Math.cos(phi) * Math.sin(lam);
    // apply tilt (rotate around x axis)
    const y2 =  y * cosT - z * sinT;
    const z2 =  y * sinT + z * cosT;
    // only draw if facing us
    return { x, y: y2, z: z2, visible: z2 > -0.05 };
  }

  function drawGlobe() {
    const W = canvas.width, H = canvas.height;
    const cx = W / 2, cy = H / 2;
    const r = Math.min(W, H) * 0.52;
    const tilt = 0.35; // ~20° tilt

    ctx.clearRect(0, 0, W, H);

    // latitudes
    for (let lat = -80; lat <= 80; lat += 20) {
      ctx.beginPath();
      let first = true;
      for (let lon = -180; lon <= 180; lon += 3) {
        const p = project(lat, lon, tilt);
        const sx = cx + p.x * r;
        const sy = cy - p.y * r;
        if (p.visible) {
          if (first) { ctx.moveTo(sx, sy); first = false; }
          else ctx.lineTo(sx, sy);
        } else {
          first = true;
        }
      }
      const alpha = lat === 0 ? 0.18 : 0.09;
      ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
      ctx.lineWidth = lat === 0 ? 1.2 : 0.7;
      ctx.stroke();
    }

    // longitudes
    for (let lon = -180; lon < 180; lon += 20) {
      ctx.beginPath();
      let first = true;
      for (let lat = -90; lat <= 90; lat += 3) {
        const p = project(lat, lon, tilt);
        const sx = cx + p.x * r;
        const sy = cy - p.y * r;
        if (p.visible) {
          if (first) { ctx.moveTo(sx, sy); first = false; }
          else ctx.lineTo(sx, sy);
        } else {
          first = true;
        }
      }
      ctx.strokeStyle = 'rgba(255,255,255,0.08)';
      ctx.lineWidth = 0.7;
      ctx.stroke();
    }

    // outer circle glow
    const grad = ctx.createRadialGradient(cx, cy, r * 0.7, cx, cy, r * 1.05);
    grad.addColorStop(0, 'rgba(180,220,255,0.0)');
    grad.addColorStop(0.85, 'rgba(180,220,255,0.07)');
    grad.addColorStop(1, 'rgba(120,180,240,0.18)');
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(200,230,255,0.22)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.fillStyle = grad;
    ctx.fill();

    rot += 0.003;
    requestAnimationFrame(drawGlobe);
  }
  drawGlobe();

  // ── countdown to May 1, 2026 ──
  const dEl = document.getElementById('d');
  const hEl = document.getElementById('h');
  const sEl = document.getElementById('s');
  const TARGET = new Date(2026, 4, 1, 0, 0, 0, 0); // May = month 4

  function pad(n) { return String(n).padStart(2, '0'); }

  function tick() {
    const diff = Math.max(0, Math.floor((TARGET - Date.now()) / 1000));
    dEl.textContent = pad(Math.floor(diff / 86400));
    hEl.textContent = pad(Math.floor((diff % 86400) / 3600));
    sEl.textContent = pad(diff % 60);
    setTimeout(tick, 1000 - (Date.now() % 1000));
  }
  tick();
</script>
</body>
</html>
