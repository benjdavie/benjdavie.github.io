<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--white:#fafaf8;--off:#f2f1ee;--black:#0e0e0e;--mid:#888;--light:#ccc;--sans:'Neue Haas Grotesk Display Pro','Helvetica Neue','Cabinet Grotesk',sans-serif;--mono:'DM Mono',monospace}
html,body{height:100%}
body{background:var(--white);color:var(--black);font-family:var(--mono);cursor:none;display:flex;flex-direction:column;overflow-x:hidden}

#cur{position:fixed;width:14px;height:14px;background:white;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:difference}
#cur-ring{position:fixed;width:38px;height:38px;border:1px solid white;border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);mix-blend-mode:difference;transition:width .25s,height .25s}

.bar{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:26px 48px;gap:16px}
.bar-name{font-family:var(--mono);font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--black);justify-self:start}
.bar-back{font-family:var(--mono);font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:var(--mid);text-decoration:none;justify-self:center;transition:color .2s}
.bar-back:hover{color:var(--black)}
.bar-links{justify-self:end;display:flex;gap:22px}
.bar-links a{font-family:var(--mono);font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:var(--black);text-decoration:none;transition:color .2s}
.bar-links a:hover{color:var(--mid)}
.footer-tagline{justify-self:end;text-align:right;font-family:var(--mono);font-size:.56rem;letter-spacing:.08em;line-height:1.9;color:var(--mid);text-transform:uppercase}
.footer-tagline strong{display:block;color:var(--black);font-weight:400;letter-spacing:.14em;margin-top:2px}

.gallery-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:24px 40px;min-height:0}
.gallery-row{display:flex;align-items:center;gap:clamp(6px,1vw,14px);width:100%;max-width:1500px;justify-content:center}
.thumb{position:relative;flex:1 1 0;max-width:150px;aspect-ratio:3/4.6;overflow:hidden;cursor:pointer;background:#e8e7e4}
.thumb img,.thumb video{width:100%;height:100%;object-fit:cover;display:block;transition:transform .7s cubic-bezier(.16,1,.3,1)}
.thumb:hover img,.thumb:hover video{transform:scale(1.05)}
.thumb-label{position:absolute;left:0;right:0;bottom:0;padding:14px 10px 12px;background:linear-gradient(180deg,transparent,rgba(0,0,0,.6) 75%);color:#fff;font-family:var(--mono);font-size:.5rem;letter-spacing:.12em;text-transform:uppercase;opacity:0;transform:translateY(8px);transition:opacity .35s ease,transform .35s ease;pointer-events:none}
.thumb:hover .thumb-label{opacity:1;transform:none}

@media(max-width:900px){
  .bar{padding:20px 22px;grid-template-columns:1fr;gap:8px;text-align:center}
  .bar-name,.bar-back,.bar-links{justify-self:center}
  .footer-tagline{justify-self:center;text-align:center}
  .gallery-row{overflow-x:auto;justify-content:flex-start;padding-bottom:8px}
  .thumb{flex:0 0 110px;max-width:110px}
}

/* ---- modal (reused) ---- */
.tag{font-family:var(--mono);font-size:.52rem;letter-spacing:.18em;text-transform:uppercase;padding:5px 10px;border:1px solid var(--light);color:var(--mid)}
.modal{position:fixed;inset:0;z-index:2000;display:flex;flex-direction:column;background:var(--white);transform:translateY(100%);transition:transform .6s cubic-bezier(.16,1,.3,1);overflow-y:auto}
.modal.open{transform:translateY(0)}
.modal-header{position:sticky;top:0;background:var(--white);z-index:10;display:flex;justify-content:space-between;align-items:center;padding:24px 52px;border-bottom:1px solid var(--light)}
.modal-title{font-family:var(--sans);font-weight:300;font-size:1.1rem;letter-spacing:-.02em;color:var(--black)}
.modal-close{font-family:var(--mono);font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--mid);background:none;border:none;cursor:pointer;padding:8px 0;transition:color .2s}
.modal-close:hover{color:var(--black)}
.modal-body{padding:52px;max-width:1100px;width:100%;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:start}
.modal-gallery{position:sticky;top:96px;display:flex;flex-direction:column;gap:16px}
.modal-gallery img,.modal-gallery video{width:100%;display:block;cursor:zoom-in;transition:opacity .2s}
.modal-gallery img:hover{opacity:.88}
.modal-num{font-family:var(--mono);font-size:.52rem;letter-spacing:.28em;color:var(--light);text-transform:uppercase;margin-bottom:16px}
.modal-big-title{font-family:var(--sans);font-weight:300;font-size:clamp(2rem,4vw,3.5rem);line-height:.95;letter-spacing:-.03em;color:var(--black);margin-bottom:28px}
.modal-big-title em{font-style:normal;color:var(--mid)}
.modal-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:28px}
.modal-desc{font-family:var(--mono);font-size:.7rem;line-height:2;color:var(--mid);margin-bottom:36px;font-weight:300}
.modal-desc a{color:#2563eb;text-decoration:none;border-bottom:1px solid #2563eb}
.modal-ext-link{display:inline-flex;align-items:center;gap:12px;font-family:var(--mono);font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--black);text-decoration:none;padding-bottom:6px;border-bottom:1px solid var(--black);transition:gap .3s,color .2s}
.modal-ext-link:hover{gap:20px;color:var(--mid)}
.modal-ext-link.hidden{display:none}
.lightbox{position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.96);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.lightbox.open{opacity:1;pointer-events:all}
.lightbox img,.lightbox video{max-width:90vw;max-height:90vh;object-fit:contain;display:block}
.lb-close{position:absolute;top:24px;right:32px;font-family:var(--mono);font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.5);background:none;border:none;cursor:pointer;transition:color .2s}
.lb-close:hover{color:white}
.lb-prev,.lb-next{position:absolute;top:50%;transform:translateY(-50%);font-size:1.2rem;color:rgba(255,255,255,.4);background:none;border:none;cursor:pointer;padding:20px;transition:color .2s}
.lb-prev{left:16px}.lb-next{right:16px}
.lb-prev:hover,.lb-next:hover{color:white}
.lb-counter{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:.55rem;letter-spacing:.2em;color:rgba(255,255,255,.35)}
@media(max-width:768px){
  .modal-header{padding:20px 24px}
  .modal-body{grid-template-columns:1fr;padding:32px 24px;gap:32px}
  .modal-gallery{position:static}
}
</style>

<script>
if (window.pdfjsLib) {
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}
var pdfDocCache = {};
function loadPdfDoc(url) {
  if (!pdfDocCache[url]) {
    pdfDocCache[url] = pdfjsLib.getDocument(url).promise;
  }
  return pdfDocCache[url];
}
function renderPdfPage(url, pageNum, canvas, targetWidth) {
  return loadPdfDoc(url).then(function(pdf) {
    return pdf.getPage(pageNum);
  }).then(function(page) {
    var base = page.getViewport({ scale: 1 });
    var scale = (targetWidth || 900) / base.width;
    var viewport = page.getViewport({ scale: scale });
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    var ctx = canvas.getContext('2d');
    return page.render({ canvasContext: ctx, viewport: viewport }).promise;
  });
}

/* ---------- Build the hover thumbnail strip from `projects` ---------- */
var galleryRow = document.getElementById('galleryRow');
projects.forEach(function(p, idx) {
  var thumb = document.createElement('div');
  thumb.className = 'thumb';
  thumb.addEventListener('click', function() { openModal(idx); });

  var cover = p.media[0];
  var coverEl;
  if (cover.type === 'video') {
    coverEl = document.createElement('video');
    coverEl.src = cover.srcs[0];
    coverEl.autoplay = true; coverEl.muted = true; coverEl.loop = true;
    coverEl.setAttribute('playsinline', '');
  } else {
    coverEl = document.createElement('img');
    coverEl.loading = 'eager';
    coverEl.alt = p.plain;
    var i = 0;
    coverEl.onerror = function() {
      i++;
      if (i < cover.srcs.length) { coverEl.src = cover.srcs[i]; }
      else { coverEl.style.display = 'none'; }
    };
    coverEl.src = cover.srcs[0];
  }
  thumb.appendChild(coverEl);

  var label = document.createElement('div');
  label.className = 'thumb-label';
  label.textContent = p.plain;
  thumb.appendChild(label);

  galleryRow.appendChild(thumb);
});

/* ---------- Media helper (used inside the modal gallery) ---------- */
function makeMediaEl(m, altText, onclick) {
  if (m.type === 'video') {
    var v = document.createElement('video');
    v.src = m.srcs[0]; v.autoplay = true; v.muted = true; v.loop = true;
    v.setAttribute('playsinline','');
    v.style.cssText = 'width:100%;display:block;';
    return v;
  } else if (m.type === 'iframe') {
    var wrap = document.createElement('div');
    wrap.style.cssText = 'width:100%;position:relative;padding-bottom:56.25%;background:#111;border-radius:4px;overflow:hidden;';
    var label = document.createElement('div');
    label.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#666;font-size:11px;letter-spacing:.1em;';
    label.textContent = 'LOADING 3D MODEL...';
    wrap.appendChild(label);
    var f = document.createElement('iframe');
    f.src = m.src;
    f.title = m.title || '3D Model';
    f.setAttribute('frameborder','0');
    f.setAttribute('allowfullscreen','');
    f.setAttribute('mozallowfullscreen','true');
    f.setAttribute('webkitallowfullscreen','true');
    f.allow = 'autoplay; fullscreen; xr-spatial-tracking';
    f.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;';
    wrap.appendChild(f);
    return wrap;
  } else {
    var img = document.createElement('img');
    img.alt = altText;
    img.style.cssText = 'width:100%;display:block;cursor:zoom-in;';
    var i = 0;
    img.onerror = function() {
      i++;
      if (i < m.srcs.length) { img.src = m.srcs[i]; }
      else { img.style.display = 'none'; }
    };
    img.src = m.srcs[0];
    if (onclick) img.onclick = onclick;
    return img;
  }
}

var modal = document.getElementById('modal');
var currentMedia = [];

async function openModal(idx) {
  var p = projects[idx];
  document.getElementById('modal-title').textContent = p.plain;
  document.getElementById('modal-num').textContent = p.num;
  document.getElementById('modal-big-title').innerHTML = p.title;
  document.getElementById('modal-desc').innerHTML = p.desc;
  document.getElementById('modal-tags').innerHTML = p.tags.map(function(t){return '<span class="tag">'+t+'</span>';}).join('');
  var extLink = document.getElementById('modal-ext-link');
  if (p.link) { extLink.href = p.link; extLink.classList.remove('hidden'); }
  else { extLink.classList.add('hidden'); }
  var gallery = document.getElementById('modal-gallery');
  gallery.innerHTML = '';
  currentMedia = [];
  modal.scrollTop = 0;
  modal.classList.add('open');
  document.documentElement.style.overflow = 'hidden';

  for (var i = 0; i < p.media.length; i++) {
    var m = p.media[i];
    if (m.type === 'pdf') {
      var pdfUrl = m.srcs[0];
      var loading = document.createElement('div');
      loading.textContent = 'Loading PDF\u2026';
      loading.style.cssText = 'font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;color:var(--mid);padding:24px 0;';
      gallery.appendChild(loading);
      try {
        var pdf = await loadPdfDoc(pdfUrl);
        loading.remove();
        for (var pg = 1; pg <= pdf.numPages; pg++) {
          var canvas = document.createElement('canvas');
          canvas.className = 'pdf-page-canvas';
          canvas.style.cssText = 'width:100%;display:block;cursor:zoom-in;';
          gallery.appendChild(canvas);
          var mediaIndex = currentMedia.length;
          currentMedia.push({ type: 'pdfpage', pdfUrl: pdfUrl, pageNum: pg });
          (function(mi){ canvas.onclick = function(){ openLightbox(mi); }; })(mediaIndex);
          await renderPdfPage(pdfUrl, pg, canvas, 900);
        }
      } catch (err) {
        loading.textContent = 'Could not load PDF.';
        console.error('PDF load failed:', err);
      }
    } else {
      var mediaIndex2 = currentMedia.length;
      currentMedia.push(m);
      var el = makeMediaEl(m, p.plain, m.type === 'img' ? (function(mi){ return function(){ openLightbox(mi); }; })(mediaIndex2) : null);
      gallery.appendChild(el);
    }
  }
}

function closeModal() {
  modal.classList.remove('open');
  document.documentElement.style.overflow = '';
}
document.getElementById('modal-close').addEventListener('click', closeModal);

var lbIndex = 0;

function openLightbox(i) {
  lbIndex = i;
  renderLightbox();
  document.getElementById('lightbox').classList.add('open');
}

function renderLightbox() {
  var m = currentMedia[lbIndex];
  var wrap = document.getElementById('lb-media');
  wrap.innerHTML = '';
  if (m.type === 'video') {
    var v = document.createElement('video');
    v.src = m.srcs[0]; v.autoplay = true; v.muted = true; v.loop = true;
    v.setAttribute('playsinline','');
    v.style.cssText = 'max-width:90vw;max-height:90vh;display:block;';
    wrap.appendChild(v);
  } else if (m.type === 'pdfpage') {
    var canvas = document.createElement('canvas');
    canvas.style.cssText = 'max-width:90vw;max-height:90vh;display:block;';
    wrap.appendChild(canvas);
    renderPdfPage(m.pdfUrl, m.pageNum, canvas, 1600).catch(function(err){
      console.error('PDF lightbox render failed:', err);
    });
  } else {
    var img = document.createElement('img');
    img.style.cssText = 'max-width:90vw;max-height:90vh;display:block;object-fit:contain;';
    var i = 0;
    img.onerror = function() { i++; if(i < m.srcs.length) img.src = m.srcs[i]; };
    img.src = m.srcs[0];
    wrap.appendChild(img);
  }
  document.getElementById('lb-counter').textContent = (lbIndex+1) + ' / ' + currentMedia.length;
  document.getElementById('lb-prev').style.opacity = lbIndex === 0 ? '0.2' : '1';
  document.getElementById('lb-next').style.opacity = lbIndex === currentMedia.length-1 ? '0.2' : '1';
}

function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
document.getElementById('lb-close').addEventListener('click', closeLightbox);
document.getElementById('lb-prev').addEventListener('click', function(){ if(lbIndex>0){ lbIndex--; renderLightbox(); } });
document.getElementById('lb-next').addEventListener('click', function(){ if(lbIndex<currentMedia.length-1){ lbIndex++; renderLightbox(); } });
document.getElementById('lightbox').addEventListener('click', function(e){ if(e.target===this) closeLightbox(); });
document.addEventListener('keydown', function(e) {
  if (document.getElementById('lightbox').classList.contains('open')) {
    if (e.key==='ArrowLeft' && lbIndex>0){ lbIndex--; renderLightbox(); }
    if (e.key==='ArrowRight' && lbIndex<currentMedia.length-1){ lbIndex++; renderLightbox(); }
    if (e.key==='Escape') closeLightbox();
  } else if (modal.classList.contains('open')) {
    if (e.key==='Escape') closeModal();
  }
});

/* ---------- Custom cursor (matches portfolio_1.html) ---------- */
var cur=document.getElementById('cur'),ring=document.getElementById('cur-ring'),mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});
(function tick(){rx+=(mx-rx)*.1;ry+=(my-ry)*.1;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(tick);})();
document.querySelectorAll('.thumb,button,a').forEach(function(el){
  el.addEventListener('mouseenter',function(){ring.style.width='54px';ring.style.height='54px';});
  el.addEventListener('mouseleave',function(){ring.style.width='38px';ring.style.height='38px';});
});
</script>
